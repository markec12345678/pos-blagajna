# POS Blagajna — Nginx Reverse Proxy Configuration
# Za SSL: dodaj certifikate v ./nginx/certs/ in odkomentiraj SSL blok

upstream pos_app {
    server app:3000;
}

upstream pos_realtime {
    server realtime:3003;
}

server {
    listen 80;
    server_name _;

    # Redirect na HTTPS (odkomentiraj v produkciji)
    # return 301 https://$host$request_uri;

    # API in aplikacija
    location / {
        proxy_pass http://pos_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    # WebSocket za real-time
    location /ws {
        proxy_pass http://pos_realtime;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Health check
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Rate limiting na nginx nivoju
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://pos_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Statične datoteke (cache 1 leto)
    location /_next/static/ {
        proxy_pass http://pos_app;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, immutable";
    }

    # Max upload velikost (10MB za slike izdelkov)
    client_max_body_size 10M;
}

